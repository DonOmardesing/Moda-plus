<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CG Moda Plus</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <style>
        body { background:#000; font-family:'Poppins',sans-serif; color:white; margin:0; }
        header { padding:20px; text-align:center; border-bottom:1px solid #d4af37; }
        .logo-img { max-width: 250px; cursor: pointer; display: block; margin: 0 auto; }
        .card { text-align: center; padding: 20px; }
        .swiper { width: 90%; max-width: 400px; border-radius: 20px; margin-top: 20px; }
        .swiper-slide img { width: 100%; height: 350px; object-fit: cover; border-radius: 20px; }
        .buy-btn { display:inline-block; margin-top:15px; padding:12px 30px; background:#d4af37; color:black; border-radius:25px; text-decoration:none; font-weight:bold; }
        #reviews { padding: 30px; background: #111; }
        .review-card { border-left: 3px solid #d4af37; padding: 10px; margin-bottom: 15px; background: #1a1a1a; }
    </style>
</head>
<body>

<header>
    <img src="https://i.imgur.com/5EyDZn5.png" alt="Logo" class="logo-img" id="adminBtn">
</header>

<div class="card">
    <div class="swiper swiper1"><div class="swiper-wrapper" id="p1Imgs"><div class="swiper-slide"><img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab"></div></div></div>
    <h2 id="p1Nom">Chaqueta Luxury</h2>
    <p id="p1Pre">$180.000</p>
    <a class="buy-btn" href="https://wa.me/573007637773">Comprar</a>
</div>

<div class="card">
    <div class="swiper swiper2"><div class="swiper-wrapper" id="p2Imgs"><div class="swiper-slide"><img src="https://images.unsplash.com/photo-1576091160550-2173dba999ef"></div></div></div>
    <h2 id="p2Nom">Set Gold</h2>
    <p id="p2Pre">$85.000</p>
    <a class="buy-btn" href="https://wa.me/573007637773">Comprar</a>
</div>

<section id="reviews">
    <h2 style="text-align:center; color:#d4af37; margin-bottom:20px;">Reseñas</h2>
    <div id="reviewsList"></div>
</section>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    const el = (id) => document.getElementById(id);
    
    // Panel Admin
    el("adminBtn").addEventListener("click", () => {
        if(prompt("Clave:") === "cg2026") {
            // Edición simplificada de productos
            localStorage.p1n = prompt("Nombre P1", el('p1Nom').innerText) || el('p1Nom').innerText;
            localStorage.p1p = prompt("Precio P1", el('p1Pre').innerText) || el('p1Pre').innerText;
            location.reload();
        }
    });

    // Cargar datos guardados
    window.onload = () => {
        if(localStorage.p1n) el('p1Nom').innerText = localStorage.p1n;
        if(localStorage.p1p) el('p1Pre').innerText = localStorage.p1p;
    };

    new Swiper('.swiper1', { loop: true });
    new Swiper('.swiper2', { loop: true });
</script>
</body>
</html>
