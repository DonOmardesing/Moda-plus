<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CG Moda Plus y Accesorios</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050505;
font-family:'Poppins',sans-serif;
overflow-x:hidden;
color:white;
}

/* HEADER */

header{
background:linear-gradient(to right,#000,#111,#000);
padding:25px 20px;
text-align:center;
border-bottom:1px solid #d4af37;
position:sticky;
top:0;
z-index:999;
}

.logo-container{
position:relative;
display:inline-block;
}

.logo{
font-family:'Cinzel',serif;
font-size:58px;
font-weight:700;
color:#d4af37;
letter-spacing:8px;
text-shadow:
0 0 10px rgba(212,175,55,.5),
0 0 20px rgba(212,175,55,.2);
cursor:pointer;
}

.sublogo{
margin-top:5px;
font-size:14px;
letter-spacing:4px;
color:#d4af37;
}

.admin-point{
position:absolute;
width:20px;
height:20px;
top:18px;
left:50%;
transform:translateX(-50%);
opacity:0;
cursor:pointer;
}

/* BOTONES */

.top-buttons{
display:flex;
justify-content:center;
gap:15px;
margin-top:25px;
flex-wrap:wrap;
}

.top-buttons a{
padding:12px 25px;
border:1px solid #d4af37;
border-radius:40px;
text-decoration:none;
color:#d4af37;
font-weight:600;
transition:.3s;
}

.top-buttons a:hover{
background:#d4af37;
color:black;
}

/* TITULOS */

.section-title{
text-align:center;
font-family:'Cinzel',serif;
font-size:34px;
margin:50px 0 25px;
color:#d4af37;
}

/* CARRUSEL */

.carousel-container{
position:relative;
margin-bottom:50px;
}

.swipe-text{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(0,0,0,.45);
padding:10px 25px;
border-radius:30px;
color:white;
font-size:14px;
z-index:50;
pointer-events:none;
}

.carousel{
display:flex;
overflow-x:auto;
scroll-behavior:smooth;
gap:25px;
padding:20px;
scrollbar-width:none;
}

.carousel::-webkit-scrollbar{
display:none;
}

/* TARJETAS */

.card{
min-width:340px;
background:#111;
border-radius:25px;
overflow:hidden;
border:1px solid rgba(212,175,55,.25);
transition:.4s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:430px;
object-fit:cover;
}

.card-content{
padding:20px;
}

.card h2{
font-size:26px;
color:#d4af37;
margin-bottom:10px;
}

.card p{
font-size:14px;
line-height:1.7;
color:#ccc;
margin-bottom:15px;
}

.price{
font-size:24px;
font-weight:bold;
margin-bottom:20px;
}

.buy-btn{
display:inline-block;
padding:12px 25px;
background:#d4af37;
color:black;
font-weight:700;
text-decoration:none;
border-radius:35px;
}

.buy-btn:hover{
background:white;
}

/* RESEÑAS */

.review-box{
max-width:700px;
margin:20px auto;
background:#111;
border-radius:20px;
padding:25px;
border:1px solid rgba(212,175,55,.25);
}

/* ADMIN PANEL */

.admin-panel{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:95%;
max-width:430px;
max-height:90vh;
overflow:auto;
background:#111;
border:1px solid #d4af37;
padding:25px;
border-radius:20px;
z-index:9999;
display:none;
}

.admin-panel button{
cursor:pointer;
}

footer{
margin-top:60px;
padding:25px;
text-align:center;
background:black;
border-top:1px solid #d4af37;
color:#999;
}

</style>
</head>

<body>

<header>

<div class="logo-container">

<div class="logo">
CG
</div>

<div class="sublogo">
Moda Plus y Accesorios
</div>

<div class="admin-point" id="adminAccess"></div>

</div>

<div class="top-buttons">

<a id="asesoriaBtn"
href="https://wa.me/573007637773?text=Hola,%20necesito%20asesoría">
Asesorías
</a>

<a href="#reviews">
Reseñas
</a>

</div>

</header>

<!-- ROPA -->

<h1 class="section-title">
Colección de Ropa
</h1>

<div class="carousel-container">

<div class="swipe-text">
Desliza ← →
</div>

<div class="carousel" id="ropaCarousel">
</div>

</div>

<!-- RESEÑAS -->

<section id="reviews">

<h1 class="section-title">
Reseñas
</h1>

<div class="review-box">
“La calidad es increíble y la atención fue demasiado buena.”
</div>

<div class="review-box">
“Muy cumplidos. La ropa llegó exactamente como en las fotos.”
</div>

<div class="review-box">
“Todo súper elegante y los precios están muy bien.”
</div>

</section>

<!-- ADMIN -->

<div class="admin-panel" id="adminPanel">
</div>

<footer>

CG Moda Plus y Accesorios © 2026

</footer>

<script>

/* ================= */
/* SEGURIDAD */
/* ================= */

document.addEventListener('contextmenu',e=>e.preventDefault());

document.onkeydown=function(e){

if(e.keyCode==123){
return false;
}

if(e.ctrlKey && e.shiftKey && e.keyCode=='I'.charCodeAt(0)){
return false;
}

if(e.ctrlKey && e.keyCode=='U'.charCodeAt(0)){
return false;
}

};

/* ================= */
/* BASE DATOS */
/* ================= */

let productos = JSON.parse(localStorage.getItem("productosCG")) || [

{
nombre:"Chaqueta Luxury",
precio:"$180.000",
descripcion:"Diseño elegante premium.",
imagenes:[
"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?q=80&w=1200&auto=format&fit=crop",
"https://images.unsplash.com/photo-1483985988355-763728e1935b?q=80&w=1200&auto=format&fit=crop",
"https://images.unsplash.com/photo-1503341504253-dff4815485f1?q=80&w=1200&auto=format&fit=crop"
]
},

{
nombre:"Vestido Gold",
precio:"$220.000",
descripcion:"Elegancia moderna exclusiva.",
imagenes:[
"https://images.unsplash.com/photo-1496747611176-843222e1e57c?q=80&w=1200&auto=format&fit=crop",
"https://images.unsplash.com/photo-1487412947147-5cebf100ffc2?q=80&w=1200&auto=format&fit=crop",
"https://images.unsplash.com/photo-1529139574466-a303027c1d8b?q=80&w=1200&auto=format&fit=crop"
]
}

];

let clientesVIP = JSON.parse(localStorage.getItem("clientesVIP")) || [];

/* ================= */
/* CATALOGO */
/* ================= */

function renderCatalogo(){

const ropa = document.getElementById("ropaCarousel");

ropa.innerHTML="";

productos.forEach((p,index)=>{

ropa.innerHTML += `

<div class="card">

<img id="img-${index}"
src="${p.imagenes[0]}">

<div class="card-content">

<h2>${p.nombre}</h2>

<p>${p.descripcion}</p>

<div class="price">
${p.precio}
</div>

<a class="buy-btn"
onclick="registrarVIP('Compra')"
href="https://wa.me/573007637773?text=Hola,%20quiero%20comprar%20${p.nombre}">
Comprar
</a>

<div style="
margin-top:15px;
text-align:center;
color:#999;
font-size:12px;
">
1/${p.imagenes.length}
</div>

</div>

</div>

`;

iniciarGaleria(index,p.imagenes);

});

}

/* ================= */
/* GALERIA */
/* ================= */

function iniciarGaleria(index,imagenes){

let actual = 0;

setInterval(()=>{

actual++;

if(actual >= imagenes.length){
actual = 0;
}

document.getElementById(`img-${index}`).src =
imagenes[actual];

},2500);

}

/* ================= */
/* VIP */
/* ================= */

function registrarVIP(tipo){

clientesVIP.push({

tipo:tipo,
fecha:new Date().toLocaleString()

});

localStorage.setItem(
"clientesVIP",
JSON.stringify(clientesVIP)
);

}

/* ================= */
/* ADMIN */
/* ================= */

document.getElementById("adminAccess")
.addEventListener("click",function(){

let clave = prompt("Clave administrador");

if(clave==="CG2026"){

abrirAdmin();

}else{

alert("Clave incorrecta");

}

});

function abrirAdmin(){

const panel = document.getElementById("adminPanel");

panel.style.display="block";

panel.innerHTML=`

<h2 style="
text-align:center;
color:#d4af37;
margin-bottom:20px;
">
Panel Premium CG
</h2>

<button onclick="nuevoProducto()"
style="
width:100%;
padding:15px;
background:#d4af37;
border:none;
border-radius:15px;
font-weight:bold;
margin-bottom:20px;
">
+ Añadir Producto
</button>

<div id="productosAdmin"></div>

<h3 style="
margin-top:25px;
color:#d4af37;
">
Clientes VIP
</h3>

<div id="vipList"></div>

`;

const lista = document.getElementById("productosAdmin");

productos.forEach((p,index)=>{

lista.innerHTML += `

<div style="
background:#1a1a1a;
padding:15px;
border-radius:15px;
margin-bottom:20px;
">

<img src="${p.imagenes[0]}"
style="
width:100%;
height:160px;
object-fit:cover;
border-radius:10px;
margin-bottom:10px;
">

<h3>${p.nombre}</h3>

<p>${p.precio}</p>

<p style="font-size:12px;color:#999;">
${p.imagenes.length} imágenes
</p>

<div style="
display:flex;
gap:10px;
margin-top:15px;
">

<button onclick="editarProducto(${index})"
style="
flex:1;
padding:10px;
background:#d4af37;
border:none;
border-radius:10px;
font-weight:bold;
">
Editar
</button>

<button onclick="eliminarProducto(${index})"
style="
flex:1;
padding:10px;
background:#7a0000;
color:white;
border:none;
border-radius:10px;
font-weight:bold;
">
Eliminar
</button>

</div>

</div>

`;

});

const vip = document.getElementById("vipList");

if(clientesVIP.length===0){

vip.innerHTML=`
<p style="color:#999;">
No hay clientes aún.
</p>
`;

}else{

clientesVIP.forEach(c=>{

vip.innerHTML += `

<div style="
background:#1a1a1a;
padding:10px;
border-radius:10px;
margin-bottom:10px;
">

<p>${c.tipo}</p>
<p style="font-size:12px;color:#999;">
${c.fecha}
</p>

</div>

`;

});

}

}

/* ================= */
/* NUEVO PRODUCTO */
/* ================= */

function nuevoProducto(){

const nombre = prompt("Nombre");
const precio = prompt("Precio");
const descripcion = prompt("Descripción");

const img1 = prompt("URL imagen 1");
const img2 = prompt("URL imagen 2");
const img3 = prompt("URL imagen 3");

productos.push({

nombre,
precio,
descripcion,

imagenes:[
img1,
img2,
img3
]

});

guardarTodo();

renderCatalogo();

abrirAdmin();

}

/* ================= */
/* EDITAR */
/* ================= */

function editarProducto(index){

let p = productos[index];

p.nombre = prompt("Nombre",p.nombre);
p.precio = prompt("Precio",p.precio);
p.descripcion = prompt("Descripción",p.descripcion);

guardarTodo();

renderCatalogo();

abrirAdmin();

}

/* ================= */
/* ELIMINAR */
/* ================= */

function eliminarProducto(index){

if(confirm("Eliminar producto?")){

productos.splice(index,1);

guardarTodo();

renderCatalogo();

abrirAdmin();

}

}

/* ================= */
/* GUARDAR */
/* ================= */

function guardarTodo(){

localStorage.setItem(
"productosCG",
JSON.stringify(productos)
);

}

/* ================= */
/* CARRUSEL AUTO */
/* ================= */

const carousels =
document.querySelectorAll('.carousel');

carousels.forEach(carousel=>{

setInterval(()=>{

carousel.scrollBy({
left:365,
behavior:'smooth'
});

if(
carousel.scrollLeft + carousel.clientWidth
>= carousel.scrollWidth - 10
){

carousel.scrollTo({
left:0,
behavior:'smooth'
});

}

},3500);

});

/* ================= */
/* ASESORIA VIP */
/* ================= */

document.getElementById("asesoriaBtn")
.addEventListener("click",()=>{

registrarVIP("Asesoría");

});

/* ================= */
/* INICIAR */
/* ================= */

renderCatalogo();

</script>

</body>
</html>
