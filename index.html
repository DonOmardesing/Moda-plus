<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CG Moda Plus y Accesorios</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background:#000; font-family:'Poppins',sans-serif; color:white; text-align:center; padding: 20px; }
        .logo-img { max-width: 200px; cursor: pointer; margin-bottom: 20px; }
        .product-img { width: 100%; max-width: 400px; border-radius: 15px; margin-bottom: 15px; }
        .buy-btn { display:inline-block; padding:12px 30px; background:#d4af37; color:black; border-radius:25px; text-decoration:none; font-weight:bold; }
    </style>
</head>
<body>

<header>
    <img src="https://i.imgur.com/5EyDZn5.png" alt="CG Moda" class="logo-img" id="adminAccess">
</header>

<div id="product-container">
    <img id="prodImg" src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab" class="product-img">
    <h2 id="prodTitle">Chaqueta Luxury</h2>
    <p id="prodPrice">$180.000</p>
    <br>
    <a class="buy-btn" id="buyLink" href="#">Comprar</a>
</div>

<script>
    // Cargar datos guardados al abrir la web
    window.onload = () => {
        if(localStorage.getItem('prodTitle')) document.getElementById('prodTitle').textContent = localStorage.getItem('prodTitle');
        if(localStorage.getItem('prodPrice')) document.getElementById('prodPrice').textContent = localStorage.getItem('prodPrice');
        if(localStorage.getItem('prodImg')) document.getElementById('prodImg').src = localStorage.getItem('prodImg');
    };

    // Panel de Admin
    document.getElementById("adminAccess").addEventListener("click", () => {
        let clave = prompt("Ingrese clave administrador:");
        if(clave === "cg2026") {
            let nNombre = prompt("Nuevo nombre del producto:", document.getElementById('prodTitle').textContent);
            let nPrecio = prompt("Nuevo precio:", document.getElementById('prodPrice').textContent);
            let nImg = prompt("URL de la nueva imagen:", document.getElementById('prodImg').src);

            if(nNombre) { document.getElementById('prodTitle').textContent = nNombre; localStorage.setItem('prodTitle', nNombre); }
            if(nPrecio) { document.getElementById('prodPrice').textContent = nPrecio; localStorage.setItem('prodPrice', nPrecio); }
            if(nImg) { document.getElementById('prodImg').src = nImg; localStorage.setItem('prodImg', nImg); }
            
            alert("Cambios guardados con éxito.");
        } else if (clave !== null) {
            alert("Clave incorrecta.");
        }
    });
</script>
</body>
</html>
